# adroit post-merge relink (GitHub Actions) — copy to .github/workflows/adr-relink.yml
#
# The "heal-on-main" half of the propose-on-branch workflow. With
# `relink_scope = self` (or `none`), a status-change PR moves an ADR between
# directories but does NOT rewrite the inbound links in OTHER ADRs — so two
# concurrent decision PRs never touch the same neighbor file and never conflict.
# This job is the single, deterministic place those inbound links are
# recomputed: after each merge to `main` it runs a full `adroit relink` and
# commits the result. See ci-templates/README.md. Two knobs:
#   1. ADROIT_DIR below — your ADR directory.
#   2. The "Install adroit" step — how the binary is obtained.

name: ADR relink

on:
  push:
    branches: [main]

# Serialize: never let two relink runs race. A newer push supersedes a queued
# one only after it finishes, so `main` always converges to one canonical state.
concurrency:
  group: adr-relink
  cancel-in-progress: false

permissions:
  contents: write

env:
  # Path to your ADR tree (relative to the repo root).
  ADROIT_DIR: docs/adrs

jobs:
  relink:
    name: Canonicalize cross-ADR links
    runs-on: ubuntu-latest
    # Don't react to the bot's own relink commit (avoids a push->relink loop).
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install adroit
        run: cargo install --git https://github.com/como-technologies/adroit --locked

      - name: Relink ADRs to their current locations
        # Always full-scope and idempotent — a no-op on an already-canonical repo
        # (so most merges produce no commit).
        run: adroit relink

      - name: Commit if anything changed
        run: |
          if [ -z "$(git status --porcelain -- "$ADROIT_DIR")" ]; then
            echo "Links already canonical — nothing to commit."
            exit 0
          fi
          git config user.name  "adroit-bot"
          git config user.email "adroit-bot@users.noreply.github.com"
          git add "$ADROIT_DIR"
          git commit -m "chore(adr): canonicalize cross-ADR links [skip ci]"
          git push
