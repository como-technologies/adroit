[package]
name = "adroit"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
description = "A snappy TUI for managing Architecture Decision Records"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
crossterm = "0.29"
directories = "6"
ratatui = "0.30"
serde = { version = "1", features = ["derive"] }
serde_yaml_ng = "0.10"
strum = { version = "0.27", features = ["derive"] }
thiserror = "2"
time = { version = "0.3", features = ["serde-human-readable", "formatting", "parsing", "macros"] }
uuid = { version = "1", features = ["v4", "serde"] }

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
tempfile = "3"
